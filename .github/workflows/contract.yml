name: contract

on:
  push:
    branches: [main]
    paths: &contract_paths
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'rust-toolchain.toml'
      - 'contracts/**'
      - 'scripts/check-schema.sh'
      - 'scripts/validate.sh'
      - '.github/workflows/contract.yml'
  pull_request:
    paths: *contract_paths

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings

  test:
    name: test (57 incl. proptests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --locked

  wasm:
    name: wasm build (sanity)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
      - uses: Swatinem/rust-cache@v2
      # This is a compile sanity check, not the optimizer-produced deployable artifact.
      - run: cargo build --release --target wasm32-unknown-unknown --lib --locked -p cw-reality

  schema:
    name: schema drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
      - uses: Swatinem/rust-cache@v2
      - run: ./scripts/check-schema.sh
      - name: negative schema-drift fixture
        run: |
          cp contracts/cw-reality/schema/cw-reality.json /tmp/cw-reality.json
          printf '\n' >> contracts/cw-reality/schema/cw-reality.json
          if ./scripts/check-schema.sh; then
            echo 'schema drift fixture was not detected' >&2
            exit 1
          fi
          cp /tmp/cw-reality.json contracts/cw-reality/schema/cw-reality.json

name: ui-policy

on:
  push:
    branches: [main]
    paths:
      - 'depricated_ui/**'
      - 'scripts/check-ui-policy.sh'
      - '.github/workflows/ui.yml'
  pull_request:
    paths:
      - 'depricated_ui/**'
      - 'scripts/check-ui-policy.sh'
      - '.github/workflows/ui.yml'

jobs:
  unsupported-ui-policy:
    name: deprecated UI remains explicitly unsupported
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - run: ./scripts/check-ui-policy.sh

[graph]
all-features = true

[advisories]
version = 2
yanked = "deny"

[licenses]
version = 2
# No repository-wide license decision is implied by this dependency allowlist.
allow = ["Apache-2.0", "MIT", "Unicode-3.0", "BSD-3-Clause"]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
